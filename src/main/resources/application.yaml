spring:
  application:
    name: RateSentinel

  datasource:
    url: jdbc:mysql://localhost:3306/rate_sentinel_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        validator:
          apply_to_ddl: false
        ddl:
          default_schema: rate_sentinel_db

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: 
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

rate-sentinel:
  default-limit: 100
  default-window-seconds: 60
  algorithm: SLIDING_WINDOW_COUNTER
  redis-fallback: FAIL_OPEN
  alert-threshold: 50

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

logging:
  level:
    com.ratesentinel: DEBUG
    org.springframework.web: INFO