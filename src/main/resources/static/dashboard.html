<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateSentinel Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 22px;
            color: #38bdf8;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-2px); }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .stat-value.green { color: #22c55e; }
        .stat-value.red { color: #ef4444; }
        .stat-value.blue { color: #38bdf8; }
        .stat-value.yellow { color: #f59e0b; }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }

        .card h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        tr:hover td { background: #0f172a; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-allow {
            background: #14532d;
            color: #22c55e;
        }

        .badge-block {
            background: #450a0a;
            color: #ef4444;
        }

        .refresh-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .refresh-btn:hover { background: #7dd3fc; }

        .last-updated {
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<header>
    <h1>⚡ RateSentinel</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span><span class="status-dot"></span>Live</span>
        <span class="last-updated" id="lastUpdated">Updating...</span>
        <button class="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
</header>

<div class="container">

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Requests (24h)</div>
            <div class="stat-value blue" id="totalRequests">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Allowed</div>
            <div class="stat-value green" id="totalAllowed">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Blocked</div>
            <div class="stat-value red" id="totalBlocked">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Block Rate</div>
            <div class="stat-value yellow" id="blockRate">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Rules</div>
            <div class="stat-value blue" id="activeRules">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Blacklisted IPs</div>
            <div class="stat-value red" id="blacklisted">—</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="card">
            <h2>Hourly Traffic (Last 24 Hours)</h2>
            <canvas id="hourlyChart" height="100"></canvas>
        </div>
        <div class="card">
            <h2>Allow vs Block Split</h2>
            <canvas id="donutChart" height="100"></canvas>
        </div>
    </div>

    <!-- Bottom Tables -->
    <div class="bottom-grid">

        <div class="card">
            <h2>Top Blocked Identifiers</h2>
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Identifier</th>
                    <th>Block Count</th>
                </tr>
                </thead>
                <tbody id="topBlockedTable">
                <tr><td colspan="3" style="text-align:center;
                        color:#64748b;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Recent Activity</h2>
            <table>
                <thead>
                <tr>
                    <th>Identifier</th>
                    <th>Endpoint</th>
                    <th>Decision</th>
                </tr>
                </thead>
                <tbody id="recentTable">
                <tr><td colspan="3" style="text-align:center;
                        color:#64748b;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    let hourlyChart, donutChart;

    async function loadData() {
        try {
            const [dashboard, topBlocked, recent] = await Promise.all([
                fetch('/api/analytics/dashboard').then(r => r.json()),
                fetch('/api/analytics/top-blocked').then(r => r.json()),
                fetch('/api/analytics/recent?limit=20').then(r => r.json())
            ]);

            updateStats(dashboard);
            updateHourlyChart(dashboard.hourlyStats);
            updateDonutChart(dashboard.totalAllowedToday,
                dashboard.totalBlockedToday);
            updateTopBlocked(topBlocked);
            updateRecentActivity(recent);

            document.getElementById('lastUpdated').textContent =
                'Updated: ' + new Date().toLocaleTimeString();

        } catch (err) {
            console.error('Failed to load data:', err);
        }
    }

    function updateStats(data) {
        document.getElementById('totalRequests').textContent =
            data.totalRequestsToday.toLocaleString();
        document.getElementById('totalAllowed').textContent =
            data.totalAllowedToday.toLocaleString();
        document.getElementById('totalBlocked').textContent =
            data.totalBlockedToday.toLocaleString();
        document.getElementById('blockRate').textContent =
            data.blockRatePercentage + '%';
        document.getElementById('activeRules').textContent =
            data.activeRulesCount;
        document.getElementById('blacklisted').textContent =
            data.blacklistedIpsCount;
    }

    function updateHourlyChart(hourlyStats) {
        const labels = hourlyStats.map(h => h.hour + ':00');
        const allowed = hourlyStats.map(h => h.allowed);
        const blocked = hourlyStats.map(h => h.blocked);

        if (hourlyChart) hourlyChart.destroy();

        hourlyChart = new Chart(
            document.getElementById('hourlyChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Allowed',
                            data: allowed,
                            backgroundColor: '#22c55e44',
                            borderColor: '#22c55e',
                            borderWidth: 1
                        },
                        {
                            label: 'Blocked',
                            data: blocked,
                            backgroundColor: '#ef444444',
                            borderColor: '#ef4444',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: {
                            labels: { color: '#94a3b8' }
                        }},
                    scales: {
                        x: { ticks: { color: '#64748b' },
                            grid: { color: '#1e293b' }},
                        y: { ticks: { color: '#64748b' },
                            grid: { color: '#334155' }}
                    }
                }
            });
    }

    function updateDonutChart(allowed, blocked) {
        if (donutChart) donutChart.destroy();

        donutChart = new Chart(
            document.getElementById('donutChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Allowed', 'Blocked'],
                    datasets: [{
                        data: [allowed, blocked],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#94a3b8' }
                        }
                    }
                }
            });
    }

    function updateTopBlocked(data) {
        const tbody = document.getElementById('topBlockedTable');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" ' +
                'style="text-align:center;color:#64748b;">' +
                'No blocked requests yet</td></tr>';
            return;
        }
        tbody.innerHTML = data.map((item, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${item.identifier}</td>
                <td style="color:#ef4444;font-weight:600;">
                    ${item.blockCount}</td>
            </tr>
        `).join('');
    }

    function updateRecentActivity(data) {
        const tbody = document.getElementById('recentTable');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" ' +
                'style="text-align:center;color:#64748b;">' +
                'No recent activity</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(item => `
            <tr>
                <td>${item.identifier}</td>
                <td style="color:#94a3b8;font-size:12px;">
                    ${item.endpoint}</td>
                <td>
                    <span class="badge ${item.decision === 'ALLOW'
            ? 'badge-allow' : 'badge-block'}">
                        ${item.decision}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    // Load data immediately
    loadData();

    // Auto refresh every 10 seconds
    setInterval(loadData, 10000);
</script>

</body>
</html>
