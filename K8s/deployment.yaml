apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratesentinel
  namespace: ratesentinel
  labels:
    app: ratesentinel
spec:
  # 3 replicas — the key to proving distributed rate limiting
  replicas: 3
  selector:
    matchLabels:
      app: ratesentinel
  template:
    metadata:
      labels:
        app: ratesentinel
    spec:
      containers:
        - name: ratesentinel
          image: ratesentinel:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ratesentinel-config
            - secretRef:
                name: ratesentinel-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health/ping
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health/ping
              port: 8080
            initialDelaySeconds: 150
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20